<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Setup</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-image: url(../images/logo.png);
      
    }
    .box {
      background: white;
      border: 1px solid blue;
      border-radius: 20px;
      padding: 30px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: #1b5e3c;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 15px;
    }
    input[type="text"],input[type="email"],input[type="password"]{
      border: ipx solid lightblue;
      border-radius: 10px;
      border-color: lightblue;
    }
  </style>
</head>
<body>

<div class="box">
  
  <div>
    <img src="images/logo.png" alt="Victoria Falls Africana Tours logo" style="width: 100px; display: block; margin: 0 auto 20px;">
    <h1 style="text-align: center; font-size: 24px; margin-bottom: 10px;">Victoria Falls Transporters</h1>
    <h2 style="text-align: center; font-size: 20px; margin-bottom: 10px;">Africana Tours</h2>
    <h2 style="text-align: center; font-size: 20px; margin-bottom: 10px;">Initial Admin Setup</h2>
  </div>

  <form id="setupForm">
    <input type="text" id="username" placeholder="Username" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit" >Create Admin</button>
  </form>
</div>

<script>
document.getElementById("setupForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  console.log("🟢 SETUP FORM SUBMITTED");

  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("https://vft-backend.onrender.com/api/admin/setup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();
    console.log("SERVER RESPONSE:", data);

    if (!res.ok) {
      alert(data.message);
      return;
    }

    alert("✅ Admin created successfully");
    window.location.href = "admin-login.html";

  } catch (err) {
    console.error("❌ FETCH ERROR:", err);
    alert("Setup failed");
  }
});
</script>

</body>
</html>
