<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <style>
    body {
      font-family: Arial;
      background-image: url("images/logo.png");
      background-size: contain;
      background-repeat: repeat-x;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      
    }
    .login-box {
      background: #ffffff;
      border: 5px solid lightblue;
      padding: 30px;
      width: 320px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(129, 115, 115, 0.1);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: #1b5e3c;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 15px;
    }
    button:hover {
      background: #15442b;
      transition: background-color 0.3s ease;
      transition: transform 0.3s ease;
    }
    img {
      margin-bottom: 20px;
      border: 0px;
      border-radius: 10px;
    }
    
    input[type="text"],input[type="email"],input[type="password"]{
      border: ipx solid lightblue;
      border-radius: 10px;
      border-color: lightblue;

    }
  </style>
</head>
<body>

<div class="login-box">
  <div>
    <img src="images/logo.png" alt="Victoria Falls Africana Tours logo" style="width: 100px; display: block; margin: 0 auto 20px;">
    <h1 style="text-align: center; font-size: 24px; margin-bottom: 10px;">Victoria Falls Transporters</h1>
    <h2 style="text-align: center; font-size: 20px; margin-bottom: 10px;">Africana Tours</h2>
    <p style="text-align: center; color: #555; margin-bottom: 20px;">Admin Login</p>
  </div>
 
  <form id="loginForm">
  <input type="text" id="username" placeholder="Username" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <button type="submit">Login</button>
</form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async e => {
  e.preventDefault();

  const res = await fetch("https://vft-backend.onrender.com/api/admin/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: document.getElementById("username").value.trim(),
      email: document.getElementById("email").value.trim().toLowerCase(),
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert("❌ " + data.message);
    return;
  }

  localStorage.setItem("adminToken", data.token);
  window.location.href = "admin-dashboard.html";
});
</script>

</body>
</html>
