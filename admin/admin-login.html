<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | Victoria Falls Transporters</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url("images/logo.png");
      background-size: contain;
      background-repeat: repeat-x;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #ffffff;
      border: 4px solid lightblue;
      padding: 30px;
      width: 320px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    img {
      width: 100px;
      display: block;
      margin: 0 auto 15px;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 4px;
    }

    h2 {
      text-align: center;
      font-size: 18px;
      margin-bottom: 10px;
      color: #1b5e3c;
    }

    p {
      text-align: center;
      color: #555;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid lightblue;
      border-radius: 10px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background: #1b5e3c;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 15px;
      font-size: 15px;
    }

    button:hover {
      background: #15442b;
    }
    .btn2 {
      display: inline-block;
      margin-bottom: 15px;
      padding: 8px 12px;
      background: #1b5e3c;
      color: white;
      text-decoration: none;
      border-radius: 15px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <a href="admin-setup.html" class="btn2">New user</a>
    <img src="images/logo.png" alt="Victoria Falls Africana Tours logo">

    <h1>Victoria Falls Transporters</h1>
    <h2>Africana Tours</h2>
    <p>Admin Login</p>

    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>

 <script>
  const form = document.getElementById("loginForm");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    try {
      const res = await fetch(
        "https://vft-backend.onrender.com/api/admin/login",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password })
        }
      );

      const data = await res.json();

      if (!res.ok) {
        alert(data.message || "Login failed");
        return;
      }

      localStorage.setItem("adminToken", data.token);
      window.location.href = "admin-dashboard.html";

    } catch (err) {
      alert("Cannot connect to server");
      console.error(err);
    }
  });
</script>

</body>
</html>
